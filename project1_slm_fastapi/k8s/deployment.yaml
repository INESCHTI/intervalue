apiVersion: apps/v1
kind: Deployment
metadata:
  name: project1-slm-fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project1-slm-fastapi
  template:
    metadata:
      labels:
        app: project1-slm-fastapi
    spec:
      containers:
        - name: app
          image: project1_slm_fastapi:latest
          ports:
            - containerPort: 8000
